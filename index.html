<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Assistant — Sign in to access your intelligent AI companion.">
    <title>AI Assistant — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
    <script>
        // Force a completely fresh cache wipe if URL has ?reset=1
        if (window.location.search.includes('reset=1')) {
            localStorage.clear();
            sessionStorage.clear();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                    for (let reg of regs) reg.unregister();
                });
            }
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                });
            }
            alert('App cache has been completely deleted. Reloading fresh site...');
            window.location.href = window.location.pathname; // Remove the reset param and reload
        }
    </script>
    <style>
        :root{--bg-primary:#0a0a1a;--bg-secondary:#0f0f2e;--text-primary:#f0f0f8;--text-secondary:#9494b8;--text-muted:#5a5a7a;--accent-violet:#8b5cf6;--accent-cyan:#06b6d4;--accent-magenta:#ec4899;--gradient-primary:linear-gradient(135deg,#8b5cf6,#06b6d4,#ec4899);--glass-bg:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);--font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased}
        .bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .bg-orbs .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.35;animation:orbFloat 12s ease-in-out infinite}
        .orb-1{width:450px;height:450px;background:var(--accent-violet);top:-15%;left:-10%}
        .orb-2{width:400px;height:400px;background:var(--accent-cyan);bottom:-15%;right:-10%;animation-delay:-4s}
        .orb-3{width:300px;height:300px;background:var(--accent-magenta);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-7s}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(25px,-25px) scale(1.08)}}
        .login-container{position:relative;z-index:1;width:90%;max-width:440px;padding:20px}
        .login-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:28px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:44px 36px;text-align:center;animation:cardIn .7s ease-out}
        @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
        .login-logo{display:inline-block;font-size:3rem;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;animation:spin 8s linear infinite}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .login-card h1{font-size:1.8rem;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
        .login-card .subtitle{color:var(--text-secondary);font-size:.92rem;margin-bottom:24px;line-height:1.5}
        .auth-tabs{display:flex;gap:4px;background:rgba(255,255,255,.05);border-radius:12px;padding:4px;margin-bottom:22px}
        .auth-tab{flex:1;padding:10px 16px;border:none;border-radius:10px;background:transparent;color:var(--text-secondary);font-size:.9rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .3s ease}
        .auth-tab.active{background:rgba(139,92,246,.2);color:var(--text-primary)}
        .auth-tab:hover:not(.active){background:rgba(255,255,255,.05)}
        .auth-panel{display:none}.auth-panel.active{display:block}
        .auth-view{display:none}.auth-view.active{display:block;animation:fadeSlide .3s ease}
        @keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 24px;background:#fff;color:#1f1f1f;border:none;border-radius:14px;font-size:1rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .3s ease;box-shadow:0 2px 12px rgba(0,0,0,.15)}
        .google-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.25)}
        .google-btn:active{transform:translateY(0)}
        .google-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .google-btn svg{width:22px;height:22px}
        .spinner{width:20px;height:20px;border:2.5px solid rgba(31,31,31,.2);border-top-color:#1f1f1f;border-radius:50%;animation:spinBtn .6s linear infinite;display:none}
        .google-btn.loading .spinner{display:block}.google-btn.loading .btn-text{display:none}
        @keyframes spinBtn{to{transform:rotate(360deg)}}
        .input-group{margin-bottom:14px}
        .input-group input{width:100%;padding:14px 18px;background:rgba(255,255,255,.06);border:1px solid var(--glass-border);border-radius:12px;color:var(--text-primary);font-size:.95rem;font-family:var(--font);outline:none;transition:border-color .3s ease}
        .input-group input:focus{border-color:var(--accent-violet)}
        .input-group input::placeholder{color:var(--text-muted)}
        .auth-submit-btn{width:100%;padding:14px;background:var(--gradient-primary);color:#fff;border:none;border-radius:14px;font-size:1rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .3s ease;margin-top:4px}
        .auth-submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(139,92,246,.3)}
        .auth-submit-btn:active{transform:translateY(0)}
        .auth-submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .auth-links{margin-top:16px;font-size:.85rem;color:var(--text-muted)}
        .auth-links a{color:var(--accent-violet);text-decoration:none;transition:color .2s}
        .auth-links a:hover{color:var(--accent-cyan)}
        .forgot-desc{color:var(--text-secondary);font-size:.9rem;margin-bottom:16px}
        .login-error,.login-success{display:none;padding:12px 16px;border-radius:12px;font-size:.85rem;margin-top:16px;text-align:left}
        .login-error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171}
        .login-success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80}
        .login-error.show,.login-success.show{display:block}
        .login-footer{margin-top:20px;color:var(--text-muted);font-size:.78rem}
        @media(max-width:480px){.login-card{padding:32px 22px;border-radius:22px}.login-card h1{font-size:1.5rem}}
    </style>
</head>
<body>
    <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">✦</div>
            <h1>AI Assistant</h1>
            <p class="subtitle">Your intelligent companion for productivity, coding, and creativity.</p>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="google">Google</button>
                <button class="auth-tab" data-tab="email">Email</button>
            </div>
            <!-- Google Panel -->
            <div class="auth-panel active" id="google-panel">
                <button class="google-btn" id="google-signin-btn">
                    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span class="btn-text">Continue with Google</span>
                    <div class="spinner"></div>
                </button>
            </div>
            <!-- Email Panel -->
            <div class="auth-panel" id="email-panel">
                <div class="auth-view active" id="signin-view">
                    <form id="email-signin-form">
                        <div class="input-group"><input type="email" id="signin-email" placeholder="Email address" required></div>
                        <div class="input-group"><input type="password" id="signin-password" placeholder="Password" required></div>
                        <button type="submit" class="auth-submit-btn" id="signin-submit-btn">Sign In</button>
                    </form>
                    <div class="auth-links"><a href="#" id="forgot-link">Forgot Password?</a> · <a href="#" id="register-link">Create Account</a></div>
                </div>
                <div class="auth-view" id="register-view">
                    <form id="email-register-form">
                        <div class="input-group"><input type="email" id="register-email" placeholder="Email address" required></div>
                        <div class="input-group"><input type="password" id="register-password" placeholder="Password (min 6 chars)" required minlength="6"></div>
                        <div class="input-group"><input type="password" id="register-confirm" placeholder="Confirm Password" required></div>
                        <button type="submit" class="auth-submit-btn" id="register-submit-btn">Create Account</button>
                    </form>
                    <div class="auth-links"><a href="#" id="back-to-signin">Already have an account? Sign In</a></div>
                </div>
                <div class="auth-view" id="forgot-view">
                    <p class="forgot-desc">Enter your email and we'll send you a password reset link.</p>
                    <form id="forgot-pw-form">
                        <div class="input-group"><input type="email" id="forgot-email" placeholder="Email address" required></div>
                        <button type="submit" class="auth-submit-btn" id="forgot-submit-btn">Send Reset Link</button>
                    </form>
                    <div class="auth-links"><a href="#" id="back-to-signin-2">Back to Sign In</a></div>
                </div>
            </div>
            <div class="login-success" id="login-success"></div>
            <div class="login-error" id="login-error"></div>
            <p class="login-footer">🔒 Secure authentication powered by Firebase</p>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script>
        redirectIfLoggedIn();
        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
                hideMessages();
            });
        });
        function showView(id) {
            document.querySelectorAll('#email-panel .auth-view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            hideMessages();
        }
        document.getElementById('register-link').onclick = e => { e.preventDefault(); showView('register-view'); };
        document.getElementById('forgot-link').onclick = e => { e.preventDefault(); showView('forgot-view'); };
        document.getElementById('back-to-signin').onclick = e => { e.preventDefault(); showView('signin-view'); };
        document.getElementById('back-to-signin-2').onclick = e => { e.preventDefault(); showView('signin-view'); };
        function showError(msg) { const el = document.getElementById('login-error'); el.textContent = '❌ ' + msg; el.classList.add('show'); }
        function showSuccess(msg) { const el = document.getElementById('login-success'); el.textContent = '✅ ' + msg; el.classList.add('show'); }
        function hideMessages() { document.getElementById('login-error').classList.remove('show'); document.getElementById('login-success').classList.remove('show'); }
        // Google
        document.getElementById('google-signin-btn').addEventListener('click', async () => {
            const btn = document.getElementById('google-signin-btn');
            btn.classList.add('loading'); btn.disabled = true; hideMessages();
            try { await signInWithGoogle(); } catch (e) { showError(e.message); btn.classList.remove('loading'); btn.disabled = false; }
        });
        // Email Sign In
        document.getElementById('email-signin-form').addEventListener('submit', async (e) => {
            e.preventDefault(); hideMessages();
            const btn = document.getElementById('signin-submit-btn'); btn.disabled = true; btn.textContent = 'Signing in...';
            try { await signInWithEmail(document.getElementById('signin-email').value.trim(), document.getElementById('signin-password').value); }
            catch (err) { showError(err.message); btn.disabled = false; btn.textContent = 'Sign In'; }
        });
        // Register
        document.getElementById('email-register-form').addEventListener('submit', async (e) => {
            e.preventDefault(); hideMessages();
            const pw = document.getElementById('register-password').value;
            if (pw !== document.getElementById('register-confirm').value) { showError('Passwords do not match.'); return; }
            const btn = document.getElementById('register-submit-btn'); btn.disabled = true; btn.textContent = 'Creating account...';
            try { await registerWithEmail(document.getElementById('register-email').value.trim(), pw); showSuccess('Account created! Please sign in.'); showView('signin-view'); btn.disabled = false; btn.textContent = 'Create Account'; }
            catch (err) { showError(err.message); btn.disabled = false; btn.textContent = 'Create Account'; }
        });
        // Forgot Password
        document.getElementById('forgot-pw-form').addEventListener('submit', async (e) => {
            e.preventDefault(); hideMessages();
            const btn = document.getElementById('forgot-submit-btn'); btn.disabled = true; btn.textContent = 'Sending...';
            try { await resetPassword(document.getElementById('forgot-email').value.trim()); showSuccess('Reset email sent! Check your inbox.'); btn.textContent = 'Sent ✓'; }
            catch (err) { showError(err.message); btn.disabled = false; btn.textContent = 'Send Reset Link'; }
        });
    </script>
</body>
</html>
